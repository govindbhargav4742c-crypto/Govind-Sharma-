<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dash | Hackathon Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="logo">
                <i class="ph ph-rocket-launch"></i>
                <span>SalesFlow</span>
            </div>
            <ul>
                <li class="active"><i class="ph ph-house"></i> Dashboard</li>
                <li><i class="ph ph-chart-line"></i> Revenue</li>
                <li><i class="ph ph-users"></i> Customers</li>
                <li><i class="ph ph-gear"></i> Settings</li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Performance Overview</h1>
                <div class="user-profile">
                    <span>Admin Mode</span>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <p>Total Sales</p>
                        <h3>$54,230</h3>
                        <span class="trend up">+12.5%</span>
                    </div>
                    <i class="ph ph-shopping-cart"></i>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <p>Average Order</p>
                        <h3>$128.50</h3>
                        <span class="trend up">+3.2%</span>
                    </div>
                    <i class="ph ph-currency-dollar"></i>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
